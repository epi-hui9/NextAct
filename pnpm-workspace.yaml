# This app doesn't rely on these optional native build scripts (no next/image
# usage; the resolver has a JS fallback), so we explicitly decline building them
# to keep `pnpm install` exit-clean on CI/Vercel.
allowBuilds:
  # esbuild ships prebuilt binaries; allow its install script so Vitest runs.
  esbuild: true
  sharp: false
  unrs-resolver: false
minimumReleaseAgeExclude:
  - "@ai-sdk/anthropic@4.0.11"
  - "@ai-sdk/gateway@4.0.15"
  - "@ai-sdk/mcp@2.0.10"
  - "@ai-sdk/provider-utils@5.0.7"
  - "@ai-sdk/provider@4.0.3"
  - "@ai-sdk/react@4.0.20"
  - ai@7.0.19
